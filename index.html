<!DOCTYPE html>
<html lang="en" class="light">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>PlantCare AI</title>
   <script src="https://cdn.tailwindcss.com"></script>
   <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-green-50 text-gray-900 min-h-screen flex flex-col">

<nav class="sticky top-0 z-50 px-6 py-4 flex justify-between items-center bg-white border-b">
   <div class="flex items-center gap-2 text-green-600">
      <i data-lucide="sprout"></i>
      <h1 class="text-xl font-bold">PlantCare AI</h1>
   </div>

   <div class="flex items-center gap-2 border rounded-full px-3 py-1">
      <i data-lucide="key" class="w-4 h-4"></i>
      <input type="password" id="api-key" placeholder="Gemini API Key"
         class="text-sm outline-none w-40">
      <div id="status-dot" class="w-3 h-3 rounded-full bg-red-500"></div>
   </div>
</nav>

<main class="max-w-6xl mx-auto p-6 grid lg:grid-cols-3 gap-6">

   <!-- LEFT PANEL -->
   <div class="lg:col-span-2 space-y-4">

      <div id="drop-zone"
         class="border-2 border-dashed border-green-300 rounded-xl p-10 text-center bg-white cursor-pointer">

         <input type="file" id="file-input" hidden accept="image/*">

         <div id="upload-prompt">
            <i data-lucide="upload-cloud" class="w-10 h-10 mx-auto text-green-600"></i>
            <p>Click to upload plant photo</p>
         </div>

         <img id="image-preview" class="hidden max-h-64 mx-auto rounded-lg">
      </div>

      <button id="analyze-btn" disabled
         class="w-full bg-green-600 text-white py-3 rounded-xl opacity-50">
         ✨ Analyze Plant
      </button>

      <div id="results-section" class="hidden bg-white p-4 rounded-xl border">
         <h3 id="res-name" class="text-xl font-bold"></h3>
         <p id="res-diagnosis" class="mt-2"></p>
      </div>

   </div>

   <!-- CHAT -->
   <div class="bg-white border rounded-xl flex flex-col h-[500px] overflow-hidden">

      <div class="p-4 bg-green-600 text-white font-bold">
         Botanist AI Chat
      </div>

      <div id="chat-messages" class="flex-grow p-4 overflow-y-auto space-y-2">
         <div class="text-sm bg-gray-100 p-2 rounded">
            Hello! Add your API key to start chatting.
         </div>
      </div>

      <form id="chat-form" class="p-3 border-t flex gap-2">
         <input id="chat-input" class="flex-grow border rounded px-3" placeholder="Ask something...">
         <button class="bg-green-600 text-white px-4 rounded">✨</button>
      </form>

   </div>

</main>

<script>
lucide.createIcons();

/* ---------------- API KEY ---------------- */
const apiKeyInput = document.getElementById("api-key");
const statusDot = document.getElementById("status-dot");
const MODEL = "gemini-1.5-flash-latest";

/* ---------------- IMAGE UPLOAD FIX ---------------- */
const dropZone = document.getElementById("drop-zone");
const fileInput = document.getElementById("file-input");
const imagePreview = document.getElementById("image-preview");
const uploadPrompt = document.getElementById("upload-prompt");
const analyzeBtn = document.getElementById("analyze-btn");

dropZone.addEventListener("click", () => fileInput.click());

fileInput.addEventListener("change", (e) => {
   const file = e.target.files[0];
   if (!file) return;

   const reader = new FileReader();

   reader.onload = (event) => {
      imagePreview.src = event.target.result;
      imagePreview.classList.remove("hidden");
      uploadPrompt.classList.add("hidden");

      analyzeBtn.disabled = false;
      analyzeBtn.classList.remove("opacity-50");
   };

   reader.readAsDataURL(file);
});

/* ---------------- API KEY CHECK ---------------- */
apiKeyInput.addEventListener("change", async () => {
   const key = apiKeyInput.value;

   try {
      const res = await fetch(
         `https://generativelanguage.googleapis.com/v1/models/${MODEL}:generateContent?key=${key}`,
         {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
               contents: [{ parts: [{ text: "test" }] }]
            })
         }
      );

      const data = await res.json();

      if (res.ok && data.candidates) {
         statusDot.className = "w-3 h-3 rounded-full bg-green-500";
         localStorage.setItem("gemini_key", key);
      } else {
         throw new Error(data.error?.message || "Invalid key");
      }

   } catch (err) {
      statusDot.className = "w-3 h-3 rounded-full bg-red-500";
      console.error(err);
   }
});

/* ---------------- CHAT ---------------- */
document.getElementById("chat-form").addEventListener("submit", async (e) => {
   e.preventDefault();

   const input = document.getElementById("chat-input");
   const msg = input.value.trim();
   if (!msg) return;

   const key = apiKeyInput.value || localStorage.getItem("gemini_key");
   const chatBox = document.getElementById("chat-messages");

   if (!key) {
      chatBox.innerHTML += `<div class="text-red-600 text-sm">Add API key first</div>`;
      return;
   }

   chatBox.innerHTML += `<div class="text-right bg-green-600 text-white p-2 rounded">${msg}</div>`;
   input.value = "";

   try {
      const res = await fetch(
         `https://generativelanguage.googleapis.com/v1/models/${MODEL}:generateContent?key=${key}`,
         {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
               contents: [{ parts: [{ text: msg }] }]
            })
         }
      );

      const data = await res.json();

      const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "No response";

      chatBox.innerHTML += `<div class="bg-gray-100 p-2 rounded">${reply}</div>`;

   } catch (err) {
      chatBox.innerHTML += `<div class="text-red-600">Error: ${err.message}</div>`;
   }
});
</script>

</body>
</html>
