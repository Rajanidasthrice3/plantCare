<!DOCTYPE html>
<html lang="en" class="light">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>PlantCare AI</title>
   
   <script src="https://cdn.tailwindcss.com"></script>
   <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            }
          }
        }
      }
   </script>
   
   <script src="https://unpkg.com/lucide@latest"></script>
   
   <style>
     .hide-scrollbar::-webkit-scrollbar { width: 6px; }
     .hide-scrollbar::-webkit-scrollbar-track { background: transparent; }
     .hide-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.5); border-radius: 20px; }
     body { margin: 0; font-family: 'Inter', system-ui, sans-serif; }
     @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
     .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
   </style>
</head>
<body class="bg-green-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-300 min-h-screen">
   
   <nav class="sticky top-0 z-10 px-6 py-4 flex justify-between items-center shadow-md bg-white dark:bg-gray-800 transition-colors">
     <div class="flex items-center gap-2 text-green-600 dark:text-green-400">
       <i data-lucide="sprout" class="w-8 h-8"></i>
       <h1 class="text-2xl font-bold tracking-tight">PlantCare AI</h1>
     </div>
     <button id="theme-toggle" class="p-2 rounded-full transition-colors bg-green-100 hover:bg-green-200 dark:bg-gray-700 dark:hover:bg-gray-600">
       <div id="theme-icon-container"><i data-lucide="moon" class="w-5 h-5 text-gray-600"></i></div>
     </button>
   </nav>
   
   <main class="max-w-7xl mx-auto p-4 md:p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 h-[calc(100vh-80px)]">
     
     <section class="flex flex-col gap-4 overflow-y-auto pr-2 pb-4 hide-scrollbar">
       <div class="p-6 rounded-2xl shadow-sm border bg-white border-green-100 dark:bg-gray-800 dark:border-gray-700 transition-colors">
         <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
           <i data-lucide="search" class="text-green-500 w-6 h-6"></i> Plant Search
         </h2>
         <form id="search-form" class="flex gap-2">
           <input type="text" id="search-input" placeholder="e.g. Rose..." class="flex-1 px-4 py-3 rounded-xl border bg-gray-50 border-gray-300 dark:bg-gray-700 dark:border-gray-600 dark:text-white" required />
           <button type="submit" id="search-btn" class="px-6 py-3 bg-green-600 text-white rounded-xl hover:bg-green-700 transition-colors">Search</button>
         </form>
         
         <div class="mt-6 pt-6 border-t border-gray-200 dark:border-gray-700">
             <h3 class="font-semibold mb-3 flex items-center gap-2"><i data-lucide="camera" class="w-5 h-5 text-green-500"></i> Health Check (Upload)</h3>
             <input type="file" id="file-upload" accept="image/*" class="hidden" />
             <button onclick="document.getElementById('file-upload').click()" class="w-full px-4 py-3 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl hover:border-green-500 transition-colors flex items-center justify-center gap-2">
                 <i data-lucide="upload" class="w-5 h-5"></i> Choose Image
             </button>
             <div id="upload-status" class="mt-2 text-sm text-center text-gray-500"></div>
         </div>
       </div>
     </section>
     
     <section id="plant-details-container" class="h-full overflow-y-auto pr-2 pb-4 hide-scrollbar">
       <div id="empty-state" class="flex flex-col items-center justify-center text-center p-12 rounded-2xl border border-dashed h-full min-h-[300px] border-green-200 bg-white/50 text-gray-500 dark:border-gray-700 dark:bg-gray-800/50">
         <i data-lucide="wind" class="w-12 h-12 mb-4 opacity-50"></i>
         <p>Search a plant or upload a photo to analyze health. Descriptions will load here.</p>
       </div>
     </section>
     
     <section class="flex flex-col rounded-2xl shadow-sm border overflow-hidden bg-white border-green-100 dark:bg-gray-800 dark:border-gray-700 h-full">
       <div class="p-4 border-b flex items-center gap-3 bg-green-50 dark:bg-gray-900/50"><i data-lucide="message-square" class="w-5 h-5 text-green-600"></i><h2 class="font-bold">PlantGPT Assistant</h2></div>
       <div id="chat-messages" class="flex-1 overflow-y-auto p-4 flex flex-col gap-4 max-h-[500px] hide-scrollbar"></div>
       <div id="typing-indicator" class="hidden p-4"><div class="flex justify-start"><div class="rounded-2xl px-4 py-3 bg-gray-100 dark:bg-gray-700">Analyzing...</div></div></div>
       <div class="p-4 border-t mt-auto">
         <form id="chat-form" class="flex gap-2">
           <input type="text" id="chat-input" class="flex-1 px-4 py-3 rounded-xl border bg-gray-50 dark:bg-gray-700 dark:text-white" placeholder="Ask about the plant..." required>
           <button type="submit" class="px-6 bg-green-600 text-white rounded-xl hover:bg-green-700 transition-colors">Send</button>
         </form>
       </div>
     </section>
   </main>
   
   <script>
     // Insert your actual Gemini API key here
     const apiKey = "YOUR_GEMINI_API_KEY_HERE"; 
     
     // Chat History State Array to maintain contextual memory
     let chatHistory = [];

     lucide.createIcons();

     // Dark Mode Toggle Logic
     const themeToggle = document.getElementById('theme-toggle');
     themeToggle.addEventListener('click', () => {
         const html = document.documentElement;
         if (html.classList.contains('light')) {
             html.classList.replace('light', 'dark');
             document.getElementById('theme-icon-container').innerHTML = `<i data-lucide="sun" class="w-5 h-5 text-yellow-400"></i>`;
         } else {
             html.classList.replace('dark', 'light');
             document.getElementById('theme-icon-container').innerHTML = `<i data-lucide="moon" class="w-5 h-5 text-gray-600"></i>`;
         }
         lucide.createIcons();
     });

     // Simple Clean Parser to map Markdown response text into clean HTML 
     function parseMarkdown(text) {
         return text
             .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>') // Bold text (**text**)
             .replace(/\*(.*?)\*/g, '<em>$1</em>')             // Italics (*text*)
             .replace(/^\s*\*\s(.*)$/gm, '<li class="ml-4 list-disc">$1</li>') // Bullet items (* item)
             .replace(/\n/g, '<br>');                           // Line breaks
     }

     // Helper function to inject structured data into the middle panel
     function updateDetailsPanel(title, rawText) {
         const container = document.getElementById('plant-details-container');
         const cleanHtml = parseMarkdown(rawText);
         container.innerHTML = `
             <div class="p-6 rounded-2xl bg-white dark:bg-gray-800 border border-green-100 dark:border-gray-700 animate-fade-in shadow-sm h-full overflow-y-auto hide-scrollbar">
                 <h2 class="text-2xl font-bold mb-4 text-green-700 dark:text-green-400 flex items-center gap-2">
                    <i data-lucide="info" class="w-6 h-6 text-green-600"></i> ${title}
                 </h2>
                 <div class="prose dark:prose-invert text-sm leading-relaxed text-gray-700 dark:text-gray-300">${cleanHtml}</div>
             </div>`;
         lucide.createIcons();
     }

     // Helper function to append messages to the chat box
     function appendToChat(sender, rawText) {
         const chatContainer = document.getElementById('chat-messages');
         const div = document.createElement('div');
         const cleanHtml = parseMarkdown(rawText);
         
         if(sender === 'user') {
             div.className = "self-end bg-green-600 text-white p-3 rounded-xl max-w-[85%] text-sm shadow-sm";
             div.textContent = rawText; // User text is clean string safely rendered
         } else {
             div.className = "self-start bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-gray-100 p-3 rounded-xl max-w-[85%] text-sm border dark:border-gray-600 shadow-sm";
             div.innerHTML = cleanHtml;
         }
         chatContainer.appendChild(div);
         chatContainer.scrollTop = chatContainer.scrollHeight;
     }

     // Search Form Submission Logic
     document.getElementById('search-form').addEventListener('submit', async (e) => {
         e.preventDefault();
         const searchInput = document.getElementById('search-input').value.trim();
         if (!searchInput) return;

         const searchBtn = document.getElementById('search-btn');
         searchBtn.disabled = true;
         searchBtn.innerText = "Searching...";

         try {
             // System style guiding rule injection inside the text prompt
             const initialPrompt = `Provide comprehensive details on care instructions, watering cycles, sunlight prerequisites, and interesting trivia facts about the plant: ${searchInput}.`;
             
             const payload = {
                 contents: [{ role: "user", parts: [{ text: initialPrompt }] }]
             };

             const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                 method: 'POST',
                 headers: { 'Content-Type': 'application/json' },
                 body: JSON.stringify(payload)
             });

             const data = await res.json();
             const responseText = data.candidates[0].content.parts[0].text;
             
             // Update main dashboard panel
             updateDetailsPanel(searchInput, responseText);

             // Synchronize history context container for the chatbot panel
             chatHistory = [
                 { role: "user", parts: [{ text: `Let's discuss this plant: ${searchInput}` }] },
                 { role: "model", parts: [{ text: responseText }] }
             ];
             
             // Clear out past casual chat nodes and print a greeting context
             document.getElementById('chat-messages').innerHTML = "";
             appendToChat('bot', `I've pulled up the information card on the **${searchInput}**. Ask me any care questions you have about it!`);

         } catch (err) {
             console.error(err);
             alert("Error fetching plant details. Verify your API key configuration.");
         } finally {
             searchBtn.disabled = false;
             searchBtn.innerText = "Search";
         }
     });
     
     // Image Upload & Analysis
     document.getElementById('file-upload').addEventListener('change', async (e) => {
         const file = e.target.files[0];
         if (!file) return;
         
         const status = document.getElementById('upload-status');
         status.innerText = "Analyzing image...";
         
         const reader = new FileReader();
         reader.onloadend = async () => {
             const base64Data = reader.result.split(',')[1];
             try {
                 const systemPrompt = "Analyze this image for plant health. Identify the exact plant name and detail any visible structural issues, nutrient deficiencies, or fungal diseases with action steps.";
                 
                 const payload = {
                     contents: [{
                         role: "user",
                         parts: [
                             { text: systemPrompt },
                             { inlineData: { mimeType: file.type, data: base64Data } }
                         ]
                     }]
                 };
                 const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                     method: 'POST',
                     headers: { 'Content-Type': 'application/json' },
                     body: JSON.stringify(payload)
                 });
                 const data = await res.json();
                 const responseText = data.candidates[0].content.parts[0].text;
                 status.innerText = "Analysis complete.";
                 
                 // Display Diagnosis inside Middle Panel
                 updateDetailsPanel("Health Diagnosis", responseText);
                 
                 // Reset Chatbot Context with the Image analysis data
                 chatHistory = [
                     { role: "user", parts: [{ text: "Here is an image of my plant. Help me diagnose its health condition." }] },
                     { role: "model", parts: [{ text: responseText }] }
                 ];
                 document.getElementById('chat-messages').innerHTML = "";
                 appendToChat('bot', `**Analysis Completed!** I've detailed my findings in the center panel. What adjustments would you like to make to your care routine?`);
                 
             } catch (err) {
                 status.innerText = "Error analyzing file.";
             }
         };
         reader.readAsDataURL(file);
     });

     // Interactive Chatbot Logic (with historic awareness retention)
     document.getElementById('chat-form').addEventListener('submit', async (e) => {
         e.preventDefault();
         const inputEl = document.getElementById('chat-input');
         const userMsg = inputEl.value.trim();
         if(!userMsg) return;

         appendToChat('user', userMsg);
         inputEl.value = "";

         const indicator = document.getElementById('typing-indicator');
         indicator.classList.remove('hidden');

         // Capture current entry inside memory list array structure
         chatHistory.push({ role: "user", parts: [{ text: userMsg }] });

         try {
             // We pass the full history array right to the raw request payload object
             const payload = { contents: chatHistory };
             
             const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                 method: 'POST',
                 headers: { 'Content-Type': 'application/json' },
                 body: JSON.stringify(payload)
             });
             const data = await res.json();
             const botResponse = data.candidates[0].content.parts[0].text;
             
             // Append response to visible stream view
             appendToChat('bot', botResponse);
             
             // Commit response to memory array state context tracking
             chatHistory.push({ role: "model", parts: [{ text: botResponse }] });
         } catch(err) {
             appendToChat('bot', "Sorry, I couldn't process that response.");
         } finally {
             indicator.classList.add('hidden');
         }
     });
   </script>
 </body>
 </html>
