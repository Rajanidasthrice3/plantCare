<!DOCTYPE html>
<html lang="en" class="light">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>PlantCare AI</title>
   <script src="https://cdn.tailwindcss.com"></script>
   <script src="https://unpkg.com/lucide@latest"></script>
   <style>
     .hide-scrollbar::-webkit-scrollbar { width: 6px; }
     .hide-scrollbar::-webkit-scrollbar-track { background: transparent; }
     .hide-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.5); border-radius: 20px; }
     @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
     .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
     .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
   </style>
</head>
<body class="bg-green-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen flex flex-col">
   
   <nav class="sticky top-0 z-50 px-6 py-4 flex justify-between items-center glass-panel border-b border-gray-200">
     <div class="flex items-center gap-2 text-green-600"><i data-lucide="sprout"></i><h1 class="text-xl font-bold">PlantCare AI</h1></div>
     <div class="flex items-center gap-3">
        <div class="flex items-center gap-2 bg-white rounded-full px-3 py-1.5 border border-gray-300">
           <i data-lucide="key" class="w-4 h-4 text-gray-400"></i>
           <input type="password" id="api-key" placeholder="Gemini API Key" class="text-sm bg-transparent outline-none w-32">
           <div id="status-dot" class="w-3 h-3 rounded-full bg-red-500"></div>
        </div>
     </div>
   </nav>

   <main class="flex-grow max-w-7xl w-full mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
      <div class="lg:col-span-2 flex flex-col gap-6">
         <div id="drop-zone" class="border-2 border-dashed border-green-300 rounded-2xl p-12 text-center bg-white cursor-pointer">
            <input type="file" id="file-input" class="hidden" accept="image/*" />
            <div id="upload-prompt"><i data-lucide="upload-cloud" class="w-10 h-10 mx-auto text-green-600"></i><p>Click to upload plant photo</p></div>
            <img id="image-preview" class="hidden max-h-64 mx-auto rounded-lg">
         </div>
         <button id="analyze-btn" disabled class="bg-green-600 text-white py-3 rounded-xl flex justify-center gap-2">
            <i data-lucide="sparkles"></i> ✨ Analyze Plant
         </button>
         <div id="results-section" class="hidden bg-white p-6 rounded-2xl border">
            <h3 id="res-name" class="text-2xl font-bold"></h3>
            <p id="res-diagnosis" class="mt-4"></p>
         </div>
      </div>

      <div class="lg:col-span-1 bg-white border rounded-2xl flex flex-col h-[500px] overflow-hidden">
         <div class="p-4 bg-green-600 text-white font-bold">Botanist AI Chat</div>
         <div id="chat-messages" class="flex-grow p-4 overflow-y-auto space-y-3">
            <div class="bg-gray-100 p-2 rounded-lg text-sm">Hello! Add your API key to start chatting.</div>
         </div>
         <form id="chat-form" class="p-4 border-t flex gap-2">
            <input type="text" id="chat-input" placeholder="Ask a question..." class="flex-grow border rounded-lg px-3">
            <button class="bg-green-600 text-white px-4 rounded-lg">✨</button>
         </form>
      </div>
   </main>

   <script>
      lucide.createIcons();
      const apiKeyInput = document.getElementById('api-key');
      const statusDot = document.getElementById('status-dot');
      const MODEL_NAME = "gemini-1.5-flash"; // Standard production flash model
      
      apiKeyInput.addEventListener('change', async () => {
   const key = apiKeyInput.value;

   try {
      const res = await fetch(
         `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,
         {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
               contents: [{ parts: [{ text: "hello" }] }]
            })
         }
      );

      const data = await res.json();

      if (res.ok && data.candidates) {
         statusDot.className = "w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_green]";
         localStorage.setItem('gemini_key', key);
      } else {
         throw new Error(data.error?.message || "Invalid API key");
      }

   } catch (err) {
      statusDot.className = "w-3 h-3 rounded-full bg-red-500";
      console.error("API Key Error:", err);
   }
});

      document.getElementById('chat-form').addEventListener('submit', async (e) => {
         e.preventDefault();
         const msg = document.getElementById('chat-input').value;
         const key = apiKeyInput.value || localStorage.getItem('gemini_key');
         const chatBox = document.getElementById('chat-messages');

         if (!key) {
            chatBox.innerHTML += `<div class="bg-red-100 p-2 rounded-lg text-sm text-red-600">Error: No API Key provided.</div>`;
            return;
         }

         chatBox.innerHTML += `<div class="text-right bg-green-600 text-white p-2 rounded-lg text-sm">${msg}</div>`;
         document.getElementById('chat-input').value = '';
         
         try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${key}`, {
               method: 'POST',
               headers: {'Content-Type': 'application/json'},
               body: JSON.stringify({ contents: [{ parts: [{ text: msg }] }] })
            });
            
            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            
            const reply = data.candidates[0].content.parts[0].text;
            chatBox.innerHTML += `<div class="bg-gray-100 p-2 rounded-lg text-sm">${reply}</div>`;
         } catch (err) {
            chatBox.innerHTML += `<div class="bg-red-100 p-2 rounded-lg text-sm text-red-600">Error: ${err.message}</div>`;
         }
      });
   </script>
</body>
</html>
