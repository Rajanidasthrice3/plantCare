<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Plant Care Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #064e3b, #10b981);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .animated-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }
        .butterfly, .flower { position: absolute; animation: float linear infinite; }
        @keyframes float {
            0% { transform: translateY(100vh) translateX(0); }
            100% { transform: translateY(-10vh) translateX(20px); }
        }
        .panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <!-- Animated Garden -->
    <div class="animated-bg" id="garden"></div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-7xl mx-auto">
        <!-- Left: Image Analysis -->
        <div class="panel">
            <h2 class="text-xl font-bold mb-4">Plant Health Scanner</h2>
            <input type="file" id="plantImage" accept="image/*" class="w-full mb-4">
            <button onclick="analyzePlant()" class="bg-green-600 hover:bg-green-700 w-full py-2 rounded">Check Health</button>
            <div id="healthResult" class="mt-4 p-3 bg-white/10 rounded hidden"></div>
        </div>

        <!-- Middle: Plant Search -->
        <div class="panel">
            <h2 class="text-xl font-bold mb-4">Plant Encyclopedia</h2>
            <div class="flex gap-2 mb-4">
                <input type="text" id="plantSearch" placeholder="Search plant..." class="w-full p-2 rounded text-black">
                <button onclick="searchPlant()" class="bg-blue-600 px-4 py-2 rounded">Search</button>
            </div>
            <div id="plantDetails" class="space-y-2"></div>
        </div>

        <!-- Right: API & Chatbot -->
        <div class="panel space-y-6">
            <div>
                <h2 class="text-xl font-bold mb-2">API System</h2>
                <input type="password" id="apiKey" placeholder="Enter Gemini API Key" class="w-full p-2 mb-2 rounded text-black">
                <button onclick="checkAPI()" class="bg-purple-600 w-full py-2 rounded">Go - Check Status</button>
                <div id="apiStatus" class="mt-2 text-sm font-mono"></div>
            </div>
            <div>
                <h2 class="text-xl font-bold mb-2">Plant Chatbot</h2>
                <div id="chatArea" class="h-48 overflow-y-auto bg-white/5 p-2 rounded mb-2 text-sm"></div>
                <div class="flex gap-2">
                    <input type="text" id="userQuery" class="w-full p-2 rounded text-black" placeholder="Ask me...">
                    <button onclick="askChatbot()" class="bg-orange-600 px-4 py-2 rounded">Ask</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=";

        // Animated elements setup
        const garden = document.getElementById('garden');
        for(let i=0; i<10; i++) {
            const el = document.createElement('div');
            el.innerHTML = i % 2 === 0 ? '🦋' : '🌸';
            el.className = i % 2 === 0 ? 'butterfly' : 'flower';
            el.style.left = Math.random() * 100 + '%';
            el.style.animationDuration = (Math.random() * 5 + 5) + 's';
            garden.appendChild(el);
        }

        async function geminiQuery(prompt, imageBase64 = null) {
            const key = document.getElementById('apiKey').value;
            if(!key) return "Error: Please enter an API key first.";
            
            const contents = [{ parts: [{ text: prompt }] }];
            if(imageBase64) {
                contents[0].parts.push({ inlineData: { mimeType: "image/jpeg", data: imageBase64 } });
            }

            try {
                const response = await fetch(API_URL + key, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents })
                });
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (e) { return "Error: Could not connect to Gemini."; }
        }

        async function analyzePlant() {
            const file = document.getElementById('plantImage').files[0];
            if(!file) return alert("Upload a plant image!");
            const reader = new FileReader();
            reader.onload = async (e) => {
                const result = await geminiQuery("Analyze this plant's health:", e.target.result.split(',')[1]);
                document.getElementById('healthResult').innerHTML = result;
                document.getElementById('healthResult').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        async function searchPlant() {
            const name = document.getElementById('plantSearch').value;
            const res = await geminiQuery("Provide details for the plant: " + name);
            document.getElementById('plantDetails').innerText = res;
        }

        function checkAPI() {
            const status = document.getElementById('apiStatus');
            status.innerText = document.getElementById('apiKey').value ? "API Status: Active (Simulated)" : "Error: Enter a key.";
        }

        async function askChatbot() {
            const q = document.getElementById('userQuery').value;
            const chat = document.getElementById('chatArea');
            chat.innerHTML += `<p><b>You:</b> ${q}</p>`;
            const res = await geminiQuery("You are a plant care expert. Answer: " + q);
            chat.innerHTML += `<p><b>AI:</b> ${res}</p>`;
        }
    </script>
</body>
</html>
