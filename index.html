<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlantCare AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-green-50 min-h-screen">

<!-- NAV -->
<nav class="flex justify-between items-center p-4 bg-white border-b">

  <h1 class="font-bold text-green-600 flex items-center gap-2">
    <i data-lucide="sprout"></i> PlantCare AI
  </h1>

  <!-- API KEY + GO BUTTON -->
  <div class="flex items-center gap-2">
    <input id="api-key" type="password"
      placeholder="Gemini API Key"
      class="border rounded px-3 py-1 w-48">

    <button id="go-btn"
      class="bg-green-600 text-white px-3 py-1 rounded">
      Go
    </button>

    <div id="status-dot" class="w-3 h-3 rounded-full bg-red-500"></div>
  </div>

</nav>

<!-- MAIN -->
<div class="max-w-5xl mx-auto p-6 space-y-6">

  <!-- IMAGE UPLOAD (FIXED) -->
  <label for="file-input"
    class="block border-2 border-dashed border-green-300 p-10 text-center bg-white rounded-xl cursor-pointer">

    <input type="file" id="file-input" accept="image/*" class="hidden">

    <p class="text-green-600 font-medium">Click to upload plant image</p>

    <img id="preview" class="hidden mt-4 max-h-64 mx-auto rounded-lg">
  </label>

  <!-- SEARCH BAR -->
  <div class="flex gap-2">
    <input id="search-input"
      placeholder="Search plant disease, care tips..."
      class="flex-grow border rounded px-3 py-2">

    <button id="search-btn"
      class="bg-green-600 text-white px-4 rounded">
      Search
    </button>
  </div>

  <!-- RESULT -->
  <div id="result" class="bg-white p-4 rounded-xl border hidden"></div>

</div>

<script>
lucide.createIcons();

const MODEL = "gemini-1.5-flash-latest";
let apiKey = "";

/* ---------------- API KEY GO BUTTON ---------------- */
document.getElementById("go-btn").addEventListener("click", async () => {
  apiKey = document.getElementById("api-key").value;

  if (!apiKey) return;

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1/models/${MODEL}:generateContent?key=${apiKey}`,
      {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          contents: [{ parts: [{ text: "test" }] }]
        })
      }
    );

    const data = await res.json();

    if (res.ok && data.candidates) {
      document.getElementById("status-dot").className =
        "w-3 h-3 rounded-full bg-green-500";
    } else {
      throw new Error(data.error?.message);
    }

  } catch (err) {
    document.getElementById("status-dot").className =
      "w-3 h-3 rounded-full bg-red-500";
  }
});

/* ---------------- IMAGE UPLOAD FIX ---------------- */
const fileInput = document.getElementById("file-input");
const preview = document.getElementById("preview");

fileInput.addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = (ev) => {
    preview.src = ev.target.result;
    preview.classList.remove("hidden");
  };

  reader.readAsDataURL(file);
});

/* ---------------- SEARCH FUNCTION ---------------- */
document.getElementById("search-btn").addEventListener("click", async () => {

  const query = document.getElementById("search-input").value;
  const resultBox = document.getElementById("result");

  if (!apiKey) {
    alert("Enter API key first");
    return;
  }

  resultBox.classList.remove("hidden");
  resultBox.innerHTML = "Thinking...";

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1/models/${MODEL}:generateContent?key=${apiKey}`,
      {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          contents: [{ parts: [{ text: query }] }]
        })
      }
    );

    const data = await res.json();

    const reply =
      data.candidates?.[0]?.content?.parts?.[0]?.text || "No response";

    resultBox.innerHTML = reply;

  } catch (err) {
    resultBox.innerHTML = "Error: " + err.message;
  }
});

</script>

</body>
</html>
